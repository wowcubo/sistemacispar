{% extends "base.html" %}
{% block title %}Nova Pendência{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-5">

  <div class="flex items-center gap-3">
    <a href="/pendencias-page" class="text-gray-400 hover:text-gray-600 transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Nova Pendência</h1>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-6" x-data="novaPendencia()">
    <form @submit.prevent="enviar" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Título <span class="text-red-500">*</span></label>
        <input type="text" x-model="form.titulo" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Descreva brevemente o problema" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Setor <span class="text-red-500">*</span></label>
          <select x-model="form.setor" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Selecione...</option>
            <option>Produção</option>
            <option>Manutenção</option>
            <option>Qualidade</option>
            <option>Almoxarifado</option>
            <option>Administrativo</option>
            <option>Geral</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Criticidade <span class="text-red-500">*</span></label>
          <select x-model="form.criticidade" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="menor">Menor</option>
            <option value="maior">Maior</option>
            <option value="critica">Crítica</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Data limite</label>
        <input type="date" x-model="form.data_limite"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição <span class="text-red-500">*</span></label>
        <textarea x-model="form.descricao" required rows="4"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
          placeholder="Descreva o problema em detalhes..."></textarea>
      </div>

      <!-- Upload de fotos/vídeos -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Fotos / Vídeos</label>
        <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-400 transition"
          @dragover.prevent @drop.prevent="adicionarArquivos($event.dataTransfer.files)">
          <svg class="w-10 h-10 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <p class="text-sm text-gray-500 mb-1">Arraste arquivos ou</p>
          <label class="cursor-pointer text-blue-600 text-sm font-medium hover:underline">
            clique para selecionar
            <input type="file" multiple accept="image/*,video/*" capture="environment" class="hidden"
              @change="adicionarArquivos($event.target.files)" />
          </label>
          <p class="text-xs text-gray-400 mt-1">Fotos e vídeos — máx 200 MB por arquivo</p>
        </div>

        <!-- Preview de arquivos -->
        <div x-show="arquivos.length > 0" class="mt-3 grid grid-cols-3 gap-2">
          <template x-for="(arq, idx) in arquivos" :key="idx">
            <div class="relative rounded-lg overflow-hidden bg-gray-100 aspect-square">
              <template x-if="arq.tipo === 'foto'">
                <img :src="arq.preview" class="w-full h-full object-cover" />
              </template>
              <template x-if="arq.tipo === 'video'">
                <div class="w-full h-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                </div>
              </template>
              <button type="button" @click="removerArquivo(idx)"
                class="absolute top-1 right-1 bg-black bg-opacity-50 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">
                ×
              </button>
            </div>
          </template>
        </div>
      </div>

      <!-- Erro -->
      <div x-show="erro" x-cloak class="p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" x-text="erro"></div>

      <div class="flex gap-3 pt-2">
        <button type="submit" :disabled="salvando"
          class="flex-1 bg-blue-700 hover:bg-blue-800 disabled:opacity-50 text-white font-semibold py-2.5 rounded-lg transition text-sm">
          <span x-show="!salvando">Registrar Pendência</span>
          <span x-show="salvando" x-cloak>Salvando...</span>
        </button>
        <a href="/pendencias-page"
          class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition text-center">
          Cancelar
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function novaPendencia() {
  return {
    form: { titulo: '', setor: '', criticidade: 'menor', descricao: '', data_limite: '' },
    arquivos: [],
    salvando: false,
    erro: '',
    pendenciaId: null,

    adicionarArquivos(files) {
      for (const f of files) {
        const tipo = f.type.startsWith('video') ? 'video' : 'foto';
        const preview = tipo === 'foto' ? URL.createObjectURL(f) : null;
        this.arquivos.push({ file: f, tipo, preview });
      }
    },

    removerArquivo(idx) {
      this.arquivos.splice(idx, 1);
    },

    async enviar() {
      this.erro = '';
      this.salvando = true;
      try {
        // 1. Criar pendência
        const res = await fetch('/pendencias/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            titulo: this.form.titulo,
            descricao: this.form.descricao,
            setor: this.form.setor,
            criticidade: this.form.criticidade,
            data_limite: this.form.data_limite || null,
          }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erro ao criar pendência');
        }
        const pendencia = await res.json();

        // 2. Upload de arquivos
        for (const arq of this.arquivos) {
          const fd = new FormData();
          fd.append('arquivo', arq.file);
          fd.append('entidade_tipo', 'pendencia');
          fd.append('entidade_id', pendencia.id);
          fd.append('setor', this.form.setor);
          await fetch('/uploads/', { method: 'POST', body: fd });
        }

        window.location.href = `/pendencias-page/${pendencia.id}`;
      } catch (e) {
        this.erro = e.message;
        this.salvando = false;
      }
    },
  };
}
</script>
{% endblock %}
