server {
    listen 80;
    server_name cispar.torresminhocaseiro.com.br;

    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cispar.torresminhocaseiro.com.br;

    # Certificado Let's Encrypt (gerado pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/cispar.torresminhocaseiro.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cispar.torresminhocaseiro.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Limite de upload (fotos/vídeos — 200 MB)
    client_max_body_size 200M;

    # Proxy para o uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Arquivos estáticos servidos diretamente pelo nginx
    location /static/ {
        alias /opt/cispar/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
